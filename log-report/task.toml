version = "1.0"

# Artifact collected after the run; must match what the task/verifier actually use.
artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
difficulty_explanation = "Parse a small access log and emit summary stats."
solution_explanation = "Read the log, count requests/unique IPs, find the top path, and write them as JSON to /app/report.json."
verification_explanation = "Parse /app/report.json and assert total_requests, unique_ips, and top_path match the values derived from /app/access.log."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
